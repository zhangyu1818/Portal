name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

env:
  APP_NAME: Portal
  APP_BUNDLE_ID: dev.zhangyu.portal
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID || 'SRD476XUQA' }}
  XCODE_PROJECT: Portal.xcodeproj
  XCODE_SCHEME: Portal

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            RELEASE_TAG="${INPUT_TAG}"
          fi
          git fetch --force --tags
          if ! git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            printf 'release tag does not exist: %s\n' "$RELEASE_TAG" >&2
            exit 64
          fi
          git checkout --detach "$RELEASE_TAG"
          RELEASE_SHA="$(git rev-list -n 1 "$RELEASE_TAG")"
          {
            printf 'RELEASE_TAG=%s\n' "$RELEASE_TAG"
            printf 'RELEASE_SHA=%s\n' "$RELEASE_SHA"
          } >> "$GITHUB_ENV"

      - name: Validate secrets
        env:
          DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_P12_BASE64 }}
          DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_P8_BASE64 }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEVELOPER_ID_APP_P12_BASE64 DEVELOPER_ID_APP_P12_PASSWORD KEYCHAIN_PASSWORD ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_PRIVATE_KEY_P8_BASE64 SPARKLE_PRIVATE_ED_KEY; do
            if [[ -z "${!name:-}" ]]; then
              printf '::error title=Missing secret::%s is required\n' "$name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Install signing credentials
        env:
          DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_P12_BASE64 }}
          DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.ASC_API_PRIVATE_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/portal-signing.keychain-db"
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$DEVELOPER_ID_APP_P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          printf '%s' "$ASC_API_PRIVATE_KEY_P8_BASE64" | base64 --decode -o "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$DEVELOPER_ID_APP_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          {
            printf 'KEYCHAIN_PATH=%s\n' "$KEYCHAIN_PATH"
            printf 'ASC_KEY_PATH=%s\n' "$ASC_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Build tests
        run: |
          set -euo pipefail
          xcodebuild build-for-testing \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "platform=macOS" \
            -derivedDataPath "$RUNNER_TEMP/test-derived-data" \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive app
        run: |
          set -euo pipefail
          ARCHIVE_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive"
          DERIVED_DATA_PATH="$RUNNER_TEMP/release-derived-data"
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            ENABLE_HARDENED_RUNTIME=YES
          {
            printf 'ARCHIVE_PATH=%s\n' "$ARCHIVE_PATH"
            printf 'DERIVED_DATA_PATH=%s\n' "$DERIVED_DATA_PATH"
          } >> "$GITHUB_ENV"

      - name: Export Developer ID app
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          EXPORT_PATH="$RUNNER_TEMP/export"
          EXPORT_OPTIONS="$RUNNER_TEMP/export-options.plist"
          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>developer-id</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_KEY_PATH" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"
          APP_PATH="$EXPORT_PATH/$APP_NAME.app"
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$APP_PATH/Contents/Info.plist")"
          BUILD_NUMBER="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' "$APP_PATH/Contents/Info.plist")"
          DIST_DIR="$RUNNER_TEMP/dist"
          DMG_NAME="$APP_NAME-$VERSION.dmg"
          DMG_PATH="$DIST_DIR/$DMG_NAME"
          mkdir -p "$DIST_DIR"
          {
            printf 'APP_PATH=%s\n' "$APP_PATH"
            printf 'APP_VERSION=%s\n' "$VERSION"
            printf 'APP_BUILD_NUMBER=%s\n' "$BUILD_NUMBER"
            printf 'DIST_DIR=%s\n' "$DIST_DIR"
            printf 'DMG_NAME=%s\n' "$DMG_NAME"
            printf 'DMG_PATH=%s\n' "$DMG_PATH"
          } >> "$GITHUB_ENV"

      - name: Verify exported app signature
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -d --entitlements :- "$APP_PATH"

      - name: Build DMG
        run: |
          set -euo pipefail
          scripts/create-release-dmg.sh "$APP_PATH" "$DMG_PATH" "$APP_NAME"
          hdiutil verify "$DMG_PATH"

      - name: Sign DMG
        run: |
          set -euo pipefail
          codesign --force --sign "Developer ID Application" --timestamp --identifier "$APP_BUNDLE_ID.dmg" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize DMG
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          NOTARY_RESULT="$DIST_DIR/notary-result.json"
          NOTARY_LOG="$DIST_DIR/notary-log.json"
          xcrun notarytool submit "$DMG_PATH" \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait \
            --timeout 2h \
            --output-format json > "$NOTARY_RESULT"
          NOTARY_STATUS="$(plutil -extract status raw -o - "$NOTARY_RESULT")"
          NOTARY_ID="$(plutil -extract id raw -o - "$NOTARY_RESULT")"
          xcrun notarytool log \
            --key "$ASC_KEY_PATH" \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            "$NOTARY_ID" \
            "$NOTARY_LOG" || true
          if [[ "$NOTARY_STATUS" != "Accepted" ]]; then
            cat "$NOTARY_RESULT"
            cat "$NOTARY_LOG"
            exit 1
          fi

      - name: Staple and verify DMG
        run: |
          set -euo pipefail
          xcrun stapler staple -v "$DMG_PATH"
          xcrun stapler validate -v "$DMG_PATH"
          hdiutil verify "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          spctl -a -t open --context context:primary-signature -v "$DMG_PATH"

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RELEASE_NOTES_PATH="$DIST_DIR/release-notes.md"
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            -f target_commitish="$RELEASE_SHA" \
            --jq '.body' > "$RELEASE_NOTES_PATH"
          printf 'RELEASE_NOTES_PATH=%s\n' "$RELEASE_NOTES_PATH" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          GENERATE_APPCAST="$(find "$DERIVED_DATA_PATH/SourcePackages/artifacts" -type f -path "*/Sparkle/bin/generate_appcast" | head -n 1)"
          if [[ -z "$GENERATE_APPCAST" ]]; then
            printf 'generate_appcast not found under %s\n' "$DERIVED_DATA_PATH/SourcePackages/artifacts" >&2
            exit 66
          fi
          APPCAST_DIR="$DIST_DIR/appcast"
          mkdir -p "$APPCAST_DIR"
          cp "$DMG_PATH" "$APPCAST_DIR/$DMG_NAME"
          cp "$RELEASE_NOTES_PATH" "$APPCAST_DIR/${DMG_NAME%.dmg}.md"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "$GENERATE_APPCAST" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/" \
            --maximum-deltas 0 \
            --embed-release-notes \
            "$APPCAST_DIR"
          test -f "$APPCAST_DIR/appcast.xml"
          printf 'APPCAST_PATH=%s\n' "$APPCAST_DIR/appcast.xml" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            "$DMG_PATH#$APP_NAME $APP_VERSION DMG" \
            "$APPCAST_PATH#Sparkle appcast" \
            --title "$APP_NAME $APP_VERSION" \
            --notes-file "$RELEASE_NOTES_PATH" \
            --verify-tag \
            --latest

      - name: Clean up keychain
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [[ -n "${KEYCHAIN_PATH:-}" && -f "$KEYCHAIN_PATH" ]]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
